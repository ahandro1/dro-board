name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Preserve live content.json
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git cat-file -e origin/gh-pages:data/content.json 2>/dev/null; then
            echo "Using live content.json from gh-pages"
            git show origin/gh-pages:data/content.json > dist/data/content.json
          else
            echo "No existing content.json on gh-pages, using build output"
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
